name: 🏨 Scrape Hotel Rating

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  scrape:
    name: Run Scraper
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4.2.2

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🕵️ Debug — simpan HTML hasil fetch
        run: python debug_fetch.py

      - name: 📤 Upload HTML debug sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_output.html
          retention-days: 1

      - name: 🕷️ Run scraper
        run: python scraper.py

      - name: 💾 Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hotel_data.json
          git diff --cached --quiet || git commit -m "🔄 Auto-update hotel data [$(date -u '+%Y-%m-%d')]"
          git push
